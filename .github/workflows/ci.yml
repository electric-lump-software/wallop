name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Format, Credo & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallop

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          path: wallop

      - name: Checkout fair_pick
        uses: actions/checkout@v4
        with:
          repository: electric-lump-software/fair_pick
          path: fair_pick

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.19"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            wallop/deps
            wallop/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('wallop/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Setup database
        run: mix ash.setup
        env:
          MIX_ENV: test

      - name: Run tests
        run: mix test
