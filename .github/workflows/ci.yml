name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Format, Credo & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallop

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          path: wallop
          fetch-depth: 0

      - name: Check no AI attribution
        working-directory: wallop
        run: |
          if git log origin/main..HEAD --format="%B" | grep -qi "co-authored-by: claude"; then
            echo "ERROR: AI co-author attribution found in commits"
            exit 1
          fi

      - name: Verify wallop_rs vector submodule is current
        working-directory: wallop
        run: |
          # Cross-language vector parity guard. wallop_rs pins this repo via
          # a submodule at vendor/wallop. If someone updates spec/vectors/
          # here without bumping that submodule pointer, wallop_rs CI keeps
          # passing against the OLD vectors — silent drift.
          #
          # This step fails the wallop PR if wallop_rs's main-branch
          # submodule points at a commit whose spec/vectors tree hash
          # differs from this PR's spec/vectors tree hash.

          WALLOP_VECTORS_SHA=$(git rev-parse HEAD:spec/vectors)

          git clone --depth=1 --filter=blob:none --no-tags \
            https://github.com/electric-lump-software/wallop_rs /tmp/wallop_rs
          WALLOP_RS_REF=$(git -C /tmp/wallop_rs ls-tree refs/heads/main vendor/wallop | awk '{print $3}')

          if [ -z "$WALLOP_RS_REF" ]; then
            echo "ERROR: could not read vendor/wallop submodule pointer from wallop_rs main"
            exit 2
          fi

          # Fetch the pinned commit so we can resolve its vectors tree hash.
          git fetch --no-tags origin "$WALLOP_RS_REF" 2>/dev/null || true

          if ! git cat-file -e "$WALLOP_RS_REF:spec/vectors" 2>/dev/null; then
            echo "ERROR: wallop_rs pins commit $WALLOP_RS_REF but cannot resolve it"
            echo "       from this wallop checkout. Run: git fetch origin $WALLOP_RS_REF"
            exit 2
          fi

          PINNED_VECTORS_SHA=$(git rev-parse "$WALLOP_RS_REF:spec/vectors")

          if [ "$WALLOP_VECTORS_SHA" != "$PINNED_VECTORS_SHA" ]; then
            echo "DRIFT: cross-language vector parity is not guaranteed."
            echo ""
            echo "  wallop HEAD spec/vectors tree: $WALLOP_VECTORS_SHA"
            echo "  wallop_rs main pins commit:    $WALLOP_RS_REF"
            echo "  → that commit's spec/vectors:  $PINNED_VECTORS_SHA"
            echo ""
            echo "If vector changes in this PR are intentional, also bump wallop_rs's"
            echo "vendor/wallop submodule pointer and land a matching PR there."
            exit 1
          fi

          echo "OK: wallop_rs pins spec/vectors tree $PINNED_VECTORS_SHA (match)."

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          otp-version: "27"
          elixir-version: "1.19"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            wallop/deps
            wallop/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('wallop/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Dependency advisory audit
        run: mix deps.audit

      - name: Restore PLT cache
        id: plt_cache
        uses: actions/cache/restore@v4
        with:
          key: plt-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('wallop/mix.lock') }}
          restore-keys: plt-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-
          path: wallop/priv/plts

      - name: Create PLTs
        if: steps.plt_cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      - name: Save PLT cache
        if: steps.plt_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: plt-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('wallop/mix.lock') }}
          path: wallop/priv/plts

      - name: Dialyzer
        run: mix dialyzer --format github --format dialyxir

      - name: Create database
        run: mix ecto.create -r WallopCore.Repo
        env:
          MIX_ENV: test

      - name: Run migrations
        run: mix ecto.migrate -r WallopCore.Repo
        env:
          MIX_ENV: test

      - name: Run tests
        run: mix test

      - name: Check OpenAPI spec is up to date
        run: |
          mix wallop.gen.openapi
          git diff --exit-code priv/openapi.json || (echo "OpenAPI spec is out of date. Run 'mix wallop.gen.openapi' and commit the result." && exit 1)
        env:
          # runtime.exs raises on missing VAULT_KEY in :dev. This step runs
          # in :dev because the openapi generator introspects the live
          # router. Give it a dummy 32-byte base64 value — this task
          # doesn't touch the vault.
          VAULT_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
