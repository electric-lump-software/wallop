name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Format, Credo & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wallop

    steps:
      - uses: actions/checkout@v4
        with:
          path: wallop

      - name: Checkout fair_pick
        uses: actions/checkout@v4
        with:
          repository: electric-lump-software/fair_pick
          path: fair_pick

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.19"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            wallop/deps
            wallop/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('wallop/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Run tests
        run: mix test
