name: Protocol change check

on:
  pull_request:
    branches: [main]

jobs:
  protocol-flag:
    name: Flag protocol-critical changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for protocol-critical file changes
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -E \
            '(protocol\.ex|sign_and_store_receipt|sign_and_store_execution_receipt|frozen_vectors|protocol_test|protocol_receipt_test|protocol_execution_receipt_test|entry_hash|lock_draw|infrastructure_signing_key|execution_receipt\.ex|transparency/)' \
            || true)
          if [ -n "$CHANGED" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post checklist comment
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const checklist = fs.readFileSync('.github/protocol-checklist.md', 'utf8');
            const files = `${{ steps.check.outputs.files }}`;
            const body = checklist + '\n\n<details><summary>Changed protocol files</summary>\n\n```\n' + files + '\n```\n</details>';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
